<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/@ongov/ontario-design-system-global-styles@latest/dist/misc/ontario-design-system-fonts.css" rel="stylesheet" />
    <link rel="stylesheet" href="main.css">
    <title>Verify Your Identity — Ontario Drive Service</title>
</head>
    <body>
        <nav>
            <!-- Banner -->
            <div class="banner">
                <a href="index.html">
                    <img src="/Ontario_logo.png" alt="Government of Ontario" property="logo">
                </a>
            </div>

            <!-- Language -->
             <div class="lang">
                <button type="button" onclick="window.location.href='fr/auth.html'">
                    Français
                </button>

                <button type="button" aria-current="true">
                    English
                </button>
             </div>

        </nav>

        <!-- Main -->
        <main>
            <h1>
                <b>Verify Your Identity</b>
            </h1>
            <p class="ontario-lead-statement">Confirm who you are so we can show you your appointment status.</p>

            <section class="booking" id="auth">
                <h2>Sign in</h2>
                <form class="auth-form">
                    <div class="form-group">
                        <label for="fullName">Full name</label>
                        <input type="text" id="fullName" name="fullName" autocomplete="name" required>
                    </div>
                    <button type="submit" class="btn-primary">Continue to dashboard</button>
                </form>
            </section>
        </main>

        <footer>
            <p>&copy; King’s Printer for Ontario, 2012–2026<span style="font-size: xx-small; color:gray; margin-left: 50px;"> DISCLAIMER: This is not an Official page part of the Ontario Government Branch</span></p>
        </footer>

        <div class="toast" id="toast" role="status" aria-live="polite"></div>

        <script>
            const form = document.querySelector('.auth-form');
            const toast = document.getElementById('toast');
            let toastTimeout;

            function showToast(message) {
                clearTimeout(toastTimeout);
                toast.textContent = message;
                toast.classList.add('visible');
                toastTimeout = setTimeout(() => toast.classList.remove('visible'), 4000);
            }

            form.addEventListener('submit', async (event) => {
                event.preventDefault();

                const fullName = document.getElementById('fullName').value;

                try {
                    const response = await fetch('/auth', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ fullName: fullName })
                    });

                    if (response.status === 404) {
                        showToast('No matching account found. Please check your name and try again.');
                        return;
                    }

                    if (!response.ok) {
                        showToast('Something went wrong. Please try again.');
                        return;
                    }

                    const data = await response.json();
                    localStorage.setItem('userId', data.id);

                    window.location.href = 'dashboard.html';

                } catch (err) {
                    showToast('Network error. Please try again.');
                }
            });
        </script>
    </body>
</html>
